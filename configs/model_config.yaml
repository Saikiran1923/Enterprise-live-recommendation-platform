two_tower:
  user_embedding_dim: 128
  video_embedding_dim: 128
  hidden_layers: [256, 128]
  dropout: 0.2
  learning_rate: 0.001
  batch_size: 1024
  epochs: 20
  temperature: 0.07

ranking_model:
  type: gradient_boosting
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  num_leaves: 63

embedding_service:
  model_path: "models/embeddings"
  cache_size: 100000
  refresh_interval: 3600

collaborative_filtering:
  num_factors: 64
  regularization: 0.01
  iterations: 20
  confidence_weight: 40
