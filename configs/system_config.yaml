system:
  name: enterprise-live-recommendation-platform
  version: "1.0.0"
  environment: production

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 30

redis:
  host: redis
  port: 6379
  db: 0
  password: ""
  max_connections: 50

kafka:
  bootstrap_servers: "kafka:9092"
  consumer_group: "recommendation-platform"
  topics:
    user_events: "user-events"
    video_events: "video-events"
    session_events: "session-events"

database:
  url: "postgresql://user:password@postgres:5432/recommendations"
  pool_size: 10
  max_overflow: 20

logging:
  level: INFO
  format: json
  output: stdout

cache:
  ttl_user_features: 300
  ttl_video_features: 600
  ttl_recommendations: 60
