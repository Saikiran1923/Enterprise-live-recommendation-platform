    name: "two_tower_vs_mf"
    variants:
      - name: "control"
        weight: 0.5
        model: "matrix_factorization_v2"
      - name: "treatment"
        weight: 0.5
        model: "two_tower_v1"
    metrics: ["ctr", "watch_time", "retention"]
